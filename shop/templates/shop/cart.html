<h1>Корзина</h1>

{% for item in items %}

<p>
    {{ item.product.name }}
    -
    {{ item.quantity }}
    шт.
</p>

<p>
    Стоимость:
    {{ item.total_price }}
</p>

<form method="post" action="/cart/update/{{ item.id }}/">

    {% csrf_token %}

    <input type="number" name="quantity">

    <button type="submit">
        Обновить
    </button>

</form>

<a href="/cart/remove/{{ item.id }}/">
    Удалить
</a>

<hr>

{% endfor %}

<h2>
    Общая сумма:
    {{ total }}
</h2>
<br>

<a href="{% url 'catalog' %}">
    Вернуться в каталог
</a>

<br>

<a href="{% url 'checkout' %}">
    Оформить заказ
</a>
