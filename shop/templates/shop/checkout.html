{% extends 'shop/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow-sm">

            <div class="card-body">

                <h1 class="mb-4">
                    Оформление заказа
                </h1>

                <h5>Товары:</h5>

                <ul class="list-group mb-4">

                    {% for item in items %}

                    <li class="list-group-item d-flex justify-content-between">

                        <span>
                            {{ item.product.name }}
                        </span>

                        <span>
                            {{ item.quantity }} шт.
                        </span>

                    </li>

                    {% endfor %}

                </ul>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Адрес доставки
                        </label>

                        <input
                            type="text"
                            name="address"
                            class="form-control"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success"
                    >
                        Подтвердить заказ
                    </button>

                    <a href="{% url 'cart' %}"
                       class="btn btn-secondary">
                        Назад
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
