{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Termos Shop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
{% csrf_token %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/">Termos Shop</a>

        <div>

            <a class="btn btn-light" href="/">Главная</a>

            <a class="btn btn-light" href="/catalog/">
                Каталог
            </a>

            <a class="btn btn-light" href="/cart/">
                Корзина
            </a>
            {% if user.is_authenticated %}

                <a href="{% url 'profile' %}" class="btn btn-info">
                Личный кабинет
                </a>

                <a href="{% url 'logout' %}" class="btn btn-danger">
                Выйти
                </a>

                {% else %}  
                <a class="btn btn-success" href="/accounts/login/">
                    Войти
                </a>
            {% endif %}

        </div>

    </div>
</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    © Termos Shop
</footer>

{% block scripts %}
{% endblock %}

<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
