{% extends 'shop/base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow">
            <div class="card-body">

                <h2 class="text-center mb-4">
                    Регистрация
                </h2>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit"
                            class="btn btn-success w-100">
                        Зарегистрироваться
                    </button>
                </form>

                <hr>

                <p class="text-center">
                    Уже есть аккаунт?
                </p>

                <a href="/accounts/login/"
                   class="btn btn-outline-primary w-100">
                    Войти
                </a>

            </div>
        </div>

    </div>
</div>

{% endblock %}
